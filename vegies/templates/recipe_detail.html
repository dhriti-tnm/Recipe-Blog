{% extends 'main.html' %}

{% block Title %}
{{ recipe.recipe_name }}
{% endblock %}

{% block Content %}
<div class="container mt-5 d-flex justify-content-center">

    <div class="card shadow p-4" style="max-width: 900px; width: 100%;">
        
        <div class="row align-items-center">
            
            <!-- Left Image -->
            <div class="col-md-5 text-center">
                <img src="{{ recipe.recipe_image.url }}" 
                     class="img-fluid rounded"
                     style="max-height: 350px;">
            </div>

            <!-- Right Content -->
            <div class="col-md-7">
                <h2 class="mb-3">{{ recipe.recipe_name }}</h2>
                <p>{{ recipe.recipe_description }}</p>
            </div>

        </div>

        <!-- Buttons Row -->
        <div class="mt-4 text-center">
            <a href="{% url 'recipe_list' %}" class="btn btn-secondary">
                Back
            </a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'recipe_update' recipe.id %}" class="btn btn-warning">Update</a>
                <a href="{% url 'recipe_delete' recipe.id %}" class="btn btn-danger">Delete</a>
            {% endif %}
        </div>

    </div>

</div>
{% endblock %}
